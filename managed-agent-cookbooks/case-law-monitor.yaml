# 裁判文书监控 Agent

**触发器**: 每天 9:00 AM
**描述**: 监控裁判文书网新判例，推送相关法律领域的新案例

## 配置

```yaml
name: case-law-monitor
schedule: "0 9 * * *"
description: "监控裁判文书网新判例"
input_prompt: |
  检查以下法律领域的新裁判文书：
  - 合同纠纷
  - 劳动争议
  - 知识产权
  - 其他关注领域
  
  对于每个新案例，提取：
  - 案件名称
  - 法院
  - 裁判日期
  - 关键法律观点
  - 对相关案件的影响

output_format: "markdown"
recipients: ["lawyer-team"]
```

## 输出示例

```markdown
# 裁判文书监控报告 - 2026-06-03

## 新案例

### 案例 1: 甲公司诉乙公司合同纠纷
- **法院**: 北京市朝阳区人民法院
- **裁判日期**: 2026-06-02
- **关键法律观点**: [观点摘要]
- **影响**: [对相关案件的影响]
```
