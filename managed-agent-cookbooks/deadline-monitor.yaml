# 诉讼时效监控 Agent

**触发器**: 每周一 9:00 AM + 每日 8:30 AM（紧急检查）
**描述**: 监控诉讼时效/举证期限，提醒即将到来的关键日期

## 配置

```yaml
name: deadline-monitor
schedule: "0 9 * * 1"
description: "监控所有活跃案件的诉讼时效、举证期限和关键节点，自动生成提醒并推送至诉讼团队"
version: "2.0"

input_prompt: |
  检查所有活跃案件的以下期限：

  一、诉讼时效
  - 普通诉讼时效（3年）
  - 特殊诉讼时效（1年/4年/20年）
  - 国际货物买卖合同和技术进出口合同争议（4年）
  - 劳动争议仲裁时效（1年）
  - 行政诉讼起诉期限（6个月）
  - 时效中止/中断/延长情况

  二、诉讼程序期限
  - 举证期限（法院指定或当事人协商）
  - 答辩期限（被告收到起诉状副本后15日/30日）
  - 上诉期限（判决15日/裁定10日/涉外30日）
  - 申请执行期限（2年）
  - 再审申请期限（6个月）
  - 管辖权异议期限（答辩期内）

  三、仲裁程序期限
  - 仲裁申请期限
  - 答辩期限
  - 举证期限
  - 仲裁裁决撤销期限（收到裁决书之日起6个月）

  四、其他关键日期
  - 开庭日期
  - 调解期限
  - 鉴定申请期限
  - 保全续保期限
  - 财产保全复议期限

  对于每个即将到来的期限（30天内），生成提醒：
  - 案件名称及案号
  - 案件类型（民事/刑事/行政/仲裁）
  - 审理法院/仲裁机构
  - 承办律师
  - 期限类型
  - 截止日期
  - 剩余天数
  - 当前状态
  - 建议行动
  - 紧急程度（紧急/重要/一般）

  特别规则：
  - 诉讼时效临近届满（30天内）且未提起诉讼的，标记为紧急
  - 举证期限临近（7天内）且举证未完成的，标记为紧急
  - 上诉期限临近（3天内），标记为紧急
  - 保全续保期限临近（15天内），标记为重要
```

output_format: "markdown"
recipients: ["litigation-team"]

error_handling:
  source_unavailable:
    action: "使用本地缓存的案件期限数据"
    fallback: "从案件管理系统本地数据库读取"
    notify: "若本地数据也过期，立即通知案件管理人"
  data_conflict:
    action: "以法院文书确定的日期为准"
    notify: "存在日期冲突时通知承办律师确认"
  calendar_error:
    action: "自动排除法定节假日和休息日"
    strategy: "依据国务院办公厅公布的年度放假安排"

escalation_rules:
  immediate_notify:
    - "期限剩余3天内的任何事项"
    - "诉讼时效即将届满且未起诉"
    - "上诉期限即将届满且尚未上诉"
    - "保全续保期限临近"
    - "举证期限剩余2天内"
  daily_reminder:
    - "期限剩余7天内的重要事项"
    - "期限剩余14天内的一般事项"
  weekly_report:
    - "所有30天内到期的期限汇总"
    - "本周新增期限"
    - "本周已处理期限"
  batch_schedule: "每日8:30紧急检查，每周一9:00完整报告"

integration:
  plugins:
    - plugin: "litigation-arbitration"
      skill: "deadline-calculation"
      trigger: "需要计算复杂期限（如涉外案件、节假日顺延）"
    - plugin: "litigation-arbitration"
      skill: "case-strategy"
      trigger: "诉讼时效即将届满需要制定应对策略"
    - plugin: "commercial-legal"
      skill: "contract-dispute-analysis"
      trigger: "合同纠纷案件期限提醒"
    - plugin: "labor-legal"
      skill: "labor-arbitration-guide"
      trigger: "劳动争议仲裁期限提醒"
    - plugin: "construction-legal"
      skill: "construction-dispute-analysis"
      trigger: "建设工程案件期限提醒"

output_template: |
  # 诉讼期限监控报告 - {{date}}

  ## 概览
  - 报告日期: {{date}}
  - 活跃案件总数: {{active_cases}}
  - 紧急事项: {{urgent_count}}
  - 重要事项: {{important_count}}
  - 一般事项: {{normal_count}}
  - 本周新增期限: {{new_deadlines}}
  - 本周已完成: {{completed_count}}

  ## 紧急事项（需立即处理）

  ### 紧急 {{index}}: {{case_name}} - {{deadline_type}}
  - **案号**: {{case_number}}
  - **案件类型**: {{case_type}}
  - **审理法院**: {{court}}
  - **承办律师**: {{handling_lawyer}}
  - **期限类型**: {{deadline_type}}
  - **截止日期**: {{deadline_date}}
  - **剩余天数**: {{remaining_days}}
  - **当前状态**: {{current_status}}
  - **建议行动**: {{recommended_action}}
  - **关联法条**: {{related_laws}}

  ## 重要事项（7天内）

  ### 重要 {{index}}: {{case_name}} - {{deadline_type}}
  - **案号**: {{case_number}}
  - **期限类型**: {{deadline_type}}
  - **截止日期**: {{deadline_date}}
  - **剩余天数**: {{remaining_days}}
  - **建议行动**: {{recommended_action}}

  ## 一般事项（30天内）
  | 案件名称 | 案号 | 期限类型 | 截止日期 | 剩余天数 | 承办律师 |
  |---------|------|---------|---------|---------|---------|
  {{deadline_table}}

  ## 本周新增期限
  {{new_deadline_list}}

  ## 本周已完成期限
  {{completed_deadline_list}}

  ## 诉讼时效预警
  | 案件名称 | 时效截止日 | 剩余天数 | 是否已起诉 | 建议 |
  |---------|-----------|---------|-----------|------|
  {{statute_of_limitations_table}}
```

configuration:
  env_vars:
    - name: "CASE_MANAGEMENT_API_URL"
      description: "案件管理系统 API 地址"
      required: true
    - name: "CASE_MANAGEMENT_API_KEY"
      description: "案件管理系统 API 密钥"
      required: true
    - name: "COURT_HOLIDAY_API_URL"
      description: "法院节假日日历 API 地址"
      default: "https://www.court.gov.cn/holiday-api"
    - name: "DEADLINE_URGENT_DAYS"
      description: "紧急期限天数阈值"
      default: "3"
    - name: "DEADLINE_IMPORTANT_DAYS"
      description: "重要期限天数阈值"
      default: "7"
    - name: "DEADLINE_NORMAL_DAYS"
      description: "一般期限天数阈值"
      default: "30"
    - name: "NOTIFICATION_CHANNEL"
      description: "通知渠道（wechat/dingtalk/email/sms）"
      default: "wechat"
    - name: "ENABLE_DAILY_CHECK"
      description: "是否启用每日紧急检查"
      default: "true"
  schedule_notes: "每周一9:00完整报告，每日8:30仅检查紧急事项"
```

